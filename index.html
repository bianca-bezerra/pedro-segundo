<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viagem Pedro II</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--text:#f0f0f0;--muted:#888;--accent:#c8f135;--accent2:#5bc8ff;--danger:#ff5f5f;--success:#4ade80;--radius:10px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}
  nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:56px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
  .nav-brand{font-family:var(--mono);font-size:14px;color:var(--accent);letter-spacing:.04em;}
  .nav-tabs{display:flex;gap:2px;}
  .tab-btn{background:none;border:none;color:var(--muted);font-family:var(--font);font-size:13px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .15s;}
  .tab-btn:hover{color:var(--text);background:var(--surface2);}
  .tab-btn.active{color:var(--accent);background:rgba(200,241,53,.1);}
  .page{display:none;padding:2rem;max-width:1100px;margin:0 auto;}
  .page.active{display:block;}
  h2{font-size:22px;font-weight:500;margin-bottom:1.5rem;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;}
  .form-row{display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:1rem;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:12px;color:var(--muted);}
  input,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:8px 12px;font-family:var(--font);font-size:14px;outline:none;transition:border .15s;}
  input:focus,select:focus{border-color:var(--accent);}
  input[type=number]{width:90px;}
  input.wide{width:200px;}
  select{width:160px;}
  .btn{background:var(--accent);color:#0f0f0f;border:none;border-radius:7px;padding:8px 18px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
  .btn:hover{opacity:.85;}
  .btn.ghost{background:none;color:var(--muted);border:1px solid var(--border);}
  .btn.ghost:hover{color:var(--text);border-color:var(--text);background:none;}
  .btn.danger{background:none;color:var(--danger);border:1px solid var(--border);}
  .btn.danger:hover{border-color:var(--danger);}
  .btn.warn{background:none;color:#f59e0b;border:1px solid var(--border);}
  .btn.warn:hover{border-color:#f59e0b;}
  .btn.sm{padding:5px 12px;font-size:12px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:8px 12px;color:var(--muted);font-weight:500;font-size:12px;border-bottom:1px solid var(--border);}
  td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,.02);}
  .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-family:var(--mono);}
  .badge.green{background:rgba(74,222,128,.15);color:var(--success);}
  .badge.blue{background:rgba(91,200,255,.15);color:var(--accent2);}
  .badge.gray{background:var(--surface2);color:var(--muted);}
  .pessoas-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .pessoa-chip{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;cursor:pointer;font-size:12px;transition:all .15s;user-select:none;}
  .pessoa-chip input{display:none;}
  .pessoa-chip.checked{background:rgba(200,241,53,.12);border-color:var(--accent);color:var(--accent);}
  .pessoa-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .15s;}
  .pessoa-chip.checked .dot{background:var(--accent);}
  .extrato-pessoa{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:.75rem;}
  .extrato-header{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.25rem;cursor:pointer;transition:background .15s;}
  .extrato-header:hover{background:var(--surface2);}
  .extrato-header .nome{font-size:15px;font-weight:500;}
  .extrato-header .valores{display:flex;align-items:center;gap:1rem;}
  .extrato-header .total-val{font-family:var(--mono);font-size:15px;color:var(--accent);}
  .extrato-body{display:none;border-top:1px solid var(--border);}
  .extrato-body.open{display:block;}
  .extrato-item{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.25rem;border-bottom:1px solid var(--border);font-size:13px;}
  .extrato-item:last-child{border-bottom:none;}
  .extrato-item .item-info{display:flex;flex-direction:column;gap:2px;}
  .extrato-item .item-name{font-weight:500;}
  .extrato-item .item-meta{color:var(--muted);font-size:11px;}
  .compra-row{display:flex;align-items:center;gap:1rem;padding:.75rem 0;border-bottom:1px solid var(--border);}
  .compra-row:last-child{border-bottom:none;}
  .compra-check{width:20px;height:20px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;}
  .compra-info{flex:1;}
  .compra-nome{font-size:14px;}
  .compra-nome.done{text-decoration:line-through;color:var(--muted);}
  .compra-meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.75rem;margin-bottom:1.5rem;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;}
  .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem;}
  .stat-val{font-family:var(--mono);font-size:22px;font-weight:500;}
  .stat-val.accent{color:var(--accent);}
  .stat-val.blue{color:var(--accent2);}
  .stat-val.green{color:var(--success);}
  .aba-toggle{display:flex;gap:4px;margin-bottom:1.25rem;}
  .aba-toggle button{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:6px 16px;font-size:13px;font-family:var(--font);cursor:pointer;}
  .aba-toggle button.on{background:rgba(200,241,53,.1);border-color:var(--accent);color:var(--accent);}
  .empty{text-align:center;padding:3rem;color:var(--muted);font-size:14px;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;}
  .modal h3{color:var(--text);font-size:16px;font-weight:500;margin-bottom:1rem;}
  .modal-actions{display:flex;justify-content:flex-end;gap:.5rem;margin-top:1.25rem;}
  .search-box{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:8px 12px;font-family:var(--font);font-size:13px;outline:none;margin-bottom:.75rem;transition:border .15s;}
  .search-box:focus{border-color:var(--accent);}
  .select-all-row{display:flex;gap:.5rem;margin-bottom:.5rem;align-items:center;}
  .select-all-row span{font-size:12px;color:var(--muted);}
  .pago-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:var(--mono);transition:all .15s;}
  .pago-btn.pago{background:rgba(74,222,128,.1);border-color:var(--success);color:var(--success);}
  .chevron{transition:transform .2s;display:inline-block;font-size:12px;color:var(--muted);}
  .chevron.open{transform:rotate(180deg);}
  .sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;}
  .sync-ok .sync-dot{background:var(--success);}
  .sync-err .sync-dot{background:var(--danger);}
  .sync-loading .sync-dot{background:var(--accent);animation:pulse .8s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .sync-label{font-size:11px;font-family:var(--mono);color:var(--muted);}
  @keyframes loading-bar{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}

  /* bottom nav mobile */
  .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:58px;
    background:var(--surface);border-top:1px solid var(--border);
    z-index:50;justify-content:space-around;align-items:center;padding:0 .5rem;}
  .bnav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;
    background:none;border:none;color:var(--muted);font-family:var(--font);
    font-size:10px;padding:6px 16px;border-radius:8px;cursor:pointer;transition:color .15s;flex:1;}
  .bnav-btn svg{margin-bottom:2px;}
  .bnav-btn.active{color:var(--accent);}

  .mobile-cards{display:none;}
  /* card de item no mobile (substitui table) */
  .item-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    padding:.875rem;margin-bottom:.5rem;}
  .item-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;}
  .item-card-nome{font-weight:500;font-size:15px;}
  .item-card-acoes{display:flex;gap:4px;flex-shrink:0;margin-left:.5rem;}
  .item-card-meta{display:flex;flex-wrap:wrap;gap:.4rem .75rem;font-size:12px;color:var(--muted);margin-bottom:.5rem;}
  .item-card-values{display:flex;justify-content:space-between;align-items:center;
    padding-top:.5rem;border-top:1px solid var(--border);}
  .item-card-total{font-family:var(--mono);font-size:14px;color:var(--accent2);}
  .item-card-pessoa{font-family:var(--mono);font-size:13px;color:var(--accent);}

  /* seleção múltipla */
  .bulk-bar{display:none;position:sticky;top:56px;z-index:90;background:var(--surface);
    border-bottom:1px solid var(--accent);padding:.6rem 1rem;
    align-items:center;gap:.75rem;flex-wrap:wrap;}
  .bulk-bar.show{display:flex;}
  .bulk-bar .bulk-info{font-size:13px;font-weight:500;color:var(--accent);flex:1;}
  .item-card.selected,.desktop-table tr.selected td{background:rgba(200,241,53,.06)!important;}
  .item-card.selected{border-color:var(--accent);}
  
  .sel-check{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
  .bulk-select-col{width:36px;}

  .form-toggle-btn{display:none;}
  @media(max-width:640px){
    .form-toggle-btn{display:flex;align-items:center;justify-content:center;gap:8px;
      width:100%;padding:10px;background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:500;
      color:var(--accent);margin-bottom:.75rem;transition:all .15s;}
    .form-toggle-btn:hover{background:var(--surface2);}
    .form-collapsible{display:none;}
    .form-collapsible.open{display:block;}
  }
  /* Hamburger - escondido no desktop */
  .hamburger{display:none;background:none;border:none;color:var(--text);cursor:pointer;
    padding:6px;align-items:center;justify-content:center;border-radius:6px;}
  .hamburger:hover{background:var(--surface2);}

  /* Drawer - escondido no desktop */
  .drawer-overlay{display:none;}
  .drawer{display:none;}

  @media(max-width:640px){
    nav .nav-tabs{display:none;}
    nav .nav-brand{display:none;}
    .bottom-nav{display:none !important;}
    .hamburger{display:flex !important;}

    /* Drawer no mobile */
 /* Drawer no mobile */
.drawer-overlay{
  position:fixed;
  top:56px;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,.55);
  z-index:100;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s;
}

.drawer-overlay.open{
  display:block;
  opacity:1;
  pointer-events:all;
}

.drawer{
  display:flex;
  flex-direction:column;
  position:fixed;
  top:56px;
  bottom:0;
  left:0;
  width:240px;
  background:var(--surface);
  z-index:101; /* acima do overlay */
  transform:translateX(-260px);
  transition:transform .25s ease;
}

.drawer.open{
  transform:translateX(0);
}

.drawer-header{
  padding:1.25rem 1rem .75rem;
  flex-shrink:0;
}

.drawer-brand{
  font-family:var(--mono);
  font-size:13px;
  color:var(--accent);
  margin-bottom:.2rem;
}

.drawer-sync{
  font-size:11px;
  color:var(--muted);
}

.drawer-nav{
  padding:.25rem 0;
  display:flex;
  flex-direction:column;
  border:none;
}

.drawer-btn{
  display:flex;
  align-items:center;
  gap:.75rem;
  width:100%;
  background:none;
  border:none;
  color:var(--muted);
  font-family:var(--font);
  font-size:15px;
  padding:.65rem 1rem;
  cursor:pointer;
  text-align:left;
}

.drawer-btn.active{
  color:var(--accent);
  background:rgba(200,241,53,.08);
}

.drawer-btn svg{
  flex-shrink:0;
}
    .page{padding:1rem;padding-bottom:1.5rem;}
    h2{font-size:18px;margin-bottom:1rem;}
    .form-row{flex-direction:column;gap:.5rem;}
    .field{width:100%;}
    .field input,.field select,input.wide,input[type=number]{width:100% !important;font-size:16px !important;}
    .btn{width:100%;justify-content:center;}
    .btn.sm{width:auto;}
    .desktop-table{display:none !important;}
    .mobile-cards{display:block !important;}
    .stats-grid{grid-template-columns:1fr 1fr;}
    .stat-val{font-size:18px;}
    .aba-toggle{width:100%;}
    .aba-toggle button{flex:1;text-align:center;}
    .modal{width:100%;max-width:100%;border-radius:18px 18px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:85vh;}
    .modal-overlay.open{align-items:flex-end;}
    .extrato-header{padding:.75rem 1rem;}
    .extrato-item{padding:.5rem 1rem;flex-wrap:wrap;gap:.5rem;}
    .extrato-item>div:last-child{width:100%;justify-content:flex-end;}
  }
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center;gap:.75rem;">
    <button class="hamburger" onclick="toggleDrawer()" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="nav-brand">// viagem pedro ii</span>
  </div>
  <div style="display:flex;align-items:center;gap:1rem;">
    <div id="sync-status" class="sync-loading"><span class="sync-dot"></span><span class="sync-label">conectando...</span></div>
    <div class="nav-tabs">
      <button class="tab-btn active" onclick="showPage('itens',this)">Itens</button>
      <button class="tab-btn" onclick="showPage('extrato',this)">Extrato</button>
    </div>
  </div>
</nav>

<!-- Drawer -->
<div class="drawer-overlay" id="drawer-overlay" onclick="toggleDrawer(event)"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-brand">// viagem pedro ii</div>
    <div class="drawer-sync" id="drawer-sync">conectando...</div>
  </div>
  <nav class="drawer-nav">
    <button class="drawer-btn active" id="dbtn-itens" onclick="showPage('itens',this);toggleDrawer(event)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      Itens
    </button>
    <button class="drawer-btn" id="dbtn-extrato" onclick="showPage('extrato',this);toggleDrawer(event)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Extrato
    </button>
  </nav>
</div>

<div id="app-loading" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:1rem;"><div style="font-family:var(--mono);color:var(--accent);font-size:14px;">// carregando...</div><div style="width:40px;height:2px;background:var(--border);border-radius:2px;overflow:hidden;"><div style="height:100%;width:40%;background:var(--accent);animation:loading-bar 1s ease infinite;"></div></div></div>
<div id="page-itens" class="page active">
  <h2>Cadastro de Itens</h2>
  <div class="card">
    <div class="aba-toggle">
      <button id="toggle-ali" class="on" onclick="setAba('Alimentação')">Alimentação</button>
      <button id="toggle-beb" onclick="setAba('Bebidas')">Bebidas</button>
      <button id="toggle-out" onclick="setAba('Outros')">Outros</button>
    </div>
    <button class="form-toggle-btn" id="form-toggle" onclick="toggleForm()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Adicionar item
    </button>
    <div class="form-collapsible" id="form-collapsible">
      <div class="form-row">
        <div class="field"><label>Item</label><input class="wide" id="inp-nome" placeholder="ex: Cerveja"/></div>
        <div class="field"><label>Qtd</label><input type="number" id="inp-qtd" placeholder="24" min="0" step="any"/></div>
        <div class="field"><label>Und</label><input id="inp-und" placeholder="lata" style="width:80px"/></div>
        <div class="field"><label>Preço unit. (R$)</label><input type="number" id="inp-preco" placeholder="2.70" min="0" step="0.01"/></div>
        <div class="field"><label>Quem pagou</label><select id="inp-pagou"><option value="">— ninguém ainda —</option></select></div>
        <button class="btn" onclick="addItem()">+ Adicionar</button>
      </div>
    </div>
  </div>
  <!-- Barra de ações em lote -->
  <div class="bulk-bar" id="bulk-bar">
    <span class="bulk-info" id="bulk-info">0 selecionados</span>
    <select id="bulk-aba" style="width:auto;font-size:12px;padding:5px 8px;">
      <option value="">Mover para...</option>
      <option value="Alimentação">Alimentação</option>
      <option value="Bebidas">Bebidas</option>
      <option value="Outros">Outros</option>
    </select>
    <select id="bulk-pagou" style="width:auto;font-size:12px;padding:5px 8px;">
      <option value="">Quem pagou...</option>
    </select>
    <button class="btn sm" onclick="openBulkPessoas()">Quem consome</button>
    <button class="btn danger sm" onclick="bulkDelete()">✕ Excluir</button>
    <button class="btn ghost sm" onclick="clearSelection()">Cancelar</button>
  </div>
  <div id="itens-table"></div>
</div>

<div id="page-extrato" class="page">
  <h2>Extrato por Pessoa</h2>
  <div class="stats-grid" id="stats-extrato"></div>
  <div id="extrato-list"></div>
</div>

<!-- MODAL EDITAR ITEM -->
<div class="modal-overlay" id="modal-item">
  <div class="modal">
    <h3 id="modal-item-title">Editar item</h3>
    <div class="form-row">
      <div class="field"><label>Item</label><input class="wide" id="edit-nome" placeholder="Nome"/></div>
      <div class="field"><label>Categoria</label><select id="edit-aba"><option value="Alimentação">Alimentação</option><option value="Bebidas">Bebidas</option><option value="Outros">Outros</option></select></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Qtd</label><input type="number" id="edit-qtd" min="0" step="any" style="width:80px"/></div>
      <div class="field"><label>Und</label><input id="edit-und" style="width:80px"/></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Preço unit. (R$)</label><input type="number" id="edit-preco" min="0" step="0.01" style="width:130px"/></div>
      <div class="field"><label>Quem pagou</label><select id="edit-pagou"><option value="">— ninguém ainda —</option></select></div>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal('modal-item')">Cancelar</button>
      <button class="btn" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL QUEM CONSOME -->
<div class="modal-overlay" id="modal-pessoas">
  <div class="modal">
    <h3 id="modal-pessoas-title">Quem vai consumir?</h3>
    <input class="search-box" id="search-pessoas" placeholder="🔍  Buscar pessoa..." oninput="filterPessoas(this.value)"/>
    <div class="select-all-row">
      <button class="btn ghost sm" onclick="selectAllPessoas(true)">Todos</button>
      <button class="btn ghost sm" onclick="selectAllPessoas(false)">Nenhum</button>
      <span id="pessoas-count"></span>
    </div>
    <div class="pessoas-grid" id="modal-pessoas-grid"></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal('modal-pessoas')">Cancelar</button>
      <button class="btn" onclick="savePessoas()">Salvar</button>
    </div>
  </div>
</div>

<!-- Firebase compat (não precisa de module, funciona com onclick normal) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ─── CONFIGURAÇÃO FIREBASE ─────────────────────────────────────────────────
// Substitua pelos seus dados do Firebase Console
const firebaseConfig = {
  apiKey: "AIzaSyDzlC8bAdUDipLz1cqVIlJ68eh7z6K-LTM",
  authDomain: "pedro-segundo-2026.firebaseapp.com",
  databaseURL: "https://pedro-segundo-2026-default-rtdb.firebaseio.com",
  projectId: "pedro-segundo-2026",
  storageBucket: "pedro-segundo-2026.firebasestorage.app",
  messagingSenderId: "35857446902",
  appId: "1:35857446902:web:95b6db0e9b9c248dd9b9d7"
};
// ──────────────────────────────────────────────────────────────────────────

const PESSOAS = ['Alanne','Artur','Bianca','Diego','Fernanda','Israel',
  'José Guilherme','Júlio','Kayky','Miguel','Patrocínio','Pedro',
  'Romero','Sávio','Tandryanny','Tiago','Victor'];

let state      = { itens: [], pagamentos: {} };
let currentAba = 'Alimentação';
let compraAba  = 'Alimentação';
let activePage = 'itens';
let modalItemId = null;
let editingId   = null;
let nextId      = 1;
let db          = null;

// ── SYNC STATUS ────────────────────────────────────────────────────────────
function hideLoading() {
  const el = document.getElementById('app-loading');
  if (el) el.style.display = 'none';
}

function setSyncStatus(s, txt) {
  const el = document.getElementById('sync-status');
  el.className = 'sync-' + s;
  el.querySelector('.sync-label').textContent = txt;
}

// ── FIREBASE INIT ──────────────────────────────────────────────────────────
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();

  let localSaveTs = 0; // timestamp do último save local

  db.ref('viagem').on('value', (snap) => {
    const data = snap.val();
    if (!data) { setSyncStatus('ok','● online'); return; }

    const newItens = data.itens ? Object.values(data.itens) : [];
    const newPags  = data.pagamentos || {};

    // Se veio do nosso próprio save (menos de 3s), só atualiza state sem re-render
    if (Date.now() - localSaveTs < 3000) {
      state.itens      = newItens;
      state.pagamentos = newPags;
      nextId = newItens.length ? Math.max(...newItens.map(i => i.id)) + 1 : 1;
      setSyncStatus('ok','● online');
      return;
    }

    // Veio de outra pessoa — atualiza e re-renderiza
    state.itens      = newItens;
    state.pagamentos = newPags;
    nextId = newItens.length ? Math.max(...newItens.map(i => i.id)) + 1 : 1;
    setSyncStatus('ok','● online');
    renderCurrentPage();
  }, () => setSyncStatus('err','✕ offline'));

} catch(e) {
  setSyncStatus('err', '✕ sem firebase');
  const local = localStorage.getItem('viagem-state');
  if (local) { state = JSON.parse(local); nextId = state.itens.length ? Math.max(...state.itens.map(i=>i.id))+1 : 1; }
  hideLoading();
  renderCurrentPage();
}

// ── PERSISTÊNCIA ───────────────────────────────────────────────────────────
function save() {
  if (db) {
    setSyncStatus('loading', '⟳ salvando...');
    localSaveTs = Date.now();
    const itensObj = {};
    state.itens.forEach(it => { itensObj[it.id] = it; });
    db.ref('viagem').set({ itens: itensObj, pagamentos: state.pagamentos || {} })
      .then(() => setSyncStatus('ok','● online'))
      .catch(() => setSyncStatus('err','✕ erro ao salvar'));
  } else {
    localStorage.setItem('viagem-state', JSON.stringify(state));
  }
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function fmt(v) { return 'R$ ' + (v||0).toFixed(2).replace('.',','); }
function totalItem(it) { return (it.qtd||0) * (it.preco||0); }
function valorPessoa(it) {
  const n = (it.quemConsome && it.quemConsome.length) ? it.quemConsome.length : PESSOAS.length;
  return totalItem(it) / n;
}

// ── FILLS DE SELECT ────────────────────────────────────────────────────────
function fillSelect(id) {
  const sel = document.getElementById(id);
  sel.innerHTML = '<option value="">— ninguém ainda —</option>';
  PESSOAS.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; sel.appendChild(o); });
}
fillSelect('inp-pagou');
fillSelect('edit-pagou');
// bulk-pagou
const bpSel = document.getElementById('bulk-pagou');
PESSOAS.forEach(p => { const o=document.createElement('option'); o.value=p; o.textContent=p; bpSel.appendChild(o); });

// ── NAVEGAÇÃO ──────────────────────────────────────────────────────────────
function toggleDrawer(e) {
  if (e) e.stopPropagation();
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('drawer-overlay').classList.toggle('open');
}

function showPage(p, btn) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  const pg = document.getElementById('page-'+p);
  if (pg) pg.classList.add('active');
  activePage = p;
  // sync top nav
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  const topBtn = document.querySelector(".tab-btn[onclick*='" + p + "']");
  if (topBtn) topBtn.classList.add('active');
  // sync drawer
  document.querySelectorAll('.drawer-btn').forEach(el => el.classList.remove('active'));
  const dBtn = document.getElementById('dbtn-'+p);
  if (dBtn) dBtn.classList.add('active');
  renderCurrentPage();
}

function renderCurrentPage() {
  if (activePage==='itens')   renderItens();

  if (activePage==='extrato') renderExtrato();
}

function setAba(aba) {
  currentAba = aba;
  document.getElementById('toggle-ali').classList.toggle('on', aba==='Alimentação');
  document.getElementById('toggle-beb').classList.toggle('on', aba==='Bebidas');
  document.getElementById('toggle-out').classList.toggle('on', aba==='Outros');
  renderItens();
}

function setCompraAba(aba) {
  compraAba = aba;
  document.getElementById('ctoggle-ali').classList.toggle('on', aba==='Alimentação');
  document.getElementById('ctoggle-beb').classList.toggle('on', aba==='Bebidas');
  document.getElementById('ctoggle-out').classList.toggle('on', aba==='Outros');
}

// ── ADICIONAR ITEM ─────────────────────────────────────────────────────────
function toggleForm() {
  const col = document.getElementById('form-collapsible');
  const btn = document.getElementById('form-toggle');
  const open = col.classList.toggle('open');
  btn.innerHTML = open
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg> Fechar'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Adicionar item';
  if (open) document.getElementById('inp-nome').focus();
}

function addItem() {
  const nome  = document.getElementById('inp-nome').value.trim();
  const qtd   = parseFloat(document.getElementById('inp-qtd').value)||0;
  const und   = document.getElementById('inp-und').value.trim();
  const preco = parseFloat(document.getElementById('inp-preco').value)||0;
  const pagou = document.getElementById('inp-pagou').value;
  if (!nome) { document.getElementById('inp-nome').focus(); return; }
  state.itens.push({ id: nextId++, aba: currentAba, nome, qtd, und, preco, quemPagou: pagou, quemConsome: [], comprado: false });
  save();
  ['inp-nome','inp-qtd','inp-und','inp-preco'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('inp-pagou').value = '';
  // Fecha o form no mobile após adicionar
  const col = document.getElementById('form-collapsible');
  const btn = document.getElementById('form-toggle');
  if (col && col.classList.contains('open') && window.innerWidth <= 640) {
    col.classList.remove('open');
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Adicionar item';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && activePage === 'itens') addItem();
});

// ── RENDER ITENS ───────────────────────────────────────────────────────────
function renderItens() {
  const itens = state.itens.filter(i => i.aba === currentAba);
  const el = document.getElementById('itens-table');
  if (!itens.length) { el.innerHTML='<div class="empty">Nenhum item. Adicione acima ↑</div>'; return; }
  const total = itens.reduce((s,i) => s+totalItem(i), 0);

  // Cards mobile
  const mobileCards = itens.map(it => `
    <div class="item-card ${selectedIds.has(it.id)?'selected':''}" data-item-id="${it.id}">
      <div class="item-card-top">
        <input type="checkbox" class="sel-check" ${selectedIds.has(it.id)?'checked':''} onchange="toggleSelect(${it.id},this.checked)" style="margin-right:6px;margin-top:2px;">
        <div style="flex:1;">
          <div class="item-card-nome">${it.nome}</div>
          <div class="item-card-meta">
            ${it.qtd?`<span>${it.qtd}${it.und?' '+it.und:''}</span>`:''}
            ${it.preco?`<span>${fmt(it.preco)}/un</span>`:''}
            ${it.quemPagou?`<span style="color:var(--accent2)">pago por ${it.quemPagou}</span>`:''}
          </div>
        </div>
        <div class="item-card-acoes">
          <button class="btn warn sm" onclick="openEditModal(${it.id})">✎</button>
          <button class="btn danger sm" onclick="removeItem(${it.id})">✕</button>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap;">
        <button class="btn ghost sm" onclick="openPessoasModal(${it.id})" style="font-size:12px;">
          ${it.quemConsome&&it.quemConsome.length
            ? `👥 ${it.quemConsome.length} pessoa${it.quemConsome.length>1?'s':''}`
            : 'todos (17)'}
        </button>
        <div class="item-card-values" style="border:none;padding:0;gap:1rem;">
          <span class="item-card-total">${it.preco?fmt(totalItem(it)):'—'}</span>
          ${it.preco?`<span class="item-card-pessoa">${fmt(valorPessoa(it))}/pessoa</span>`:''}
        </div>
      </div>
    </div>`).join('');

  // Tabela desktop
  const desktopTable = `
    <div class="card desktop-table" style="padding:0;overflow:hidden;">
    <table>
      <thead><tr>
        <th class="bulk-select-col"><input type="checkbox" class="sel-check" id="sel-all" onchange="toggleSelectAll(this.checked)"></th>
        <th>Item</th><th>Qtd / Und</th><th>Preço unit.</th><th>Total</th>
        <th>Quem consome</th><th>Val/pessoa</th><th>Quem pagou</th><th></th>
      </tr></thead>
      <tbody>
      ${itens.map(it => `
        <tr class="${selectedIds.has(it.id)?'selected':''}" data-item-id="${it.id}">
          <td><input type="checkbox" class="sel-check" ${selectedIds.has(it.id)?'checked':''} onchange="toggleSelect(${it.id},this.checked)"></td>
          <td style="font-weight:500">${it.nome}</td>
          <td style="font-family:var(--mono)">${it.qtd}${it.und?' '+it.und:''}</td>
          <td style="font-family:var(--mono)">${it.preco?fmt(it.preco):'—'}</td>
          <td style="font-family:var(--mono);color:var(--accent2)">${it.preco?fmt(totalItem(it)):'—'}</td>
          <td>
            <button class="btn ghost sm" onclick="openPessoasModal(${it.id})">
              ${it.quemConsome&&it.quemConsome.length
                ? `<span style="color:var(--accent)">${it.quemConsome.length} pessoa${it.quemConsome.length>1?'s':''}</span>`
                : '<span style="color:var(--muted)">todos (17)</span>'}
            </button>
          </td>
          <td style="font-family:var(--mono);color:var(--accent)">${it.preco?fmt(valorPessoa(it)):'—'}</td>
          <td>${it.quemPagou?`<span class="badge blue">${it.quemPagou}</span>`:'<span class="badge gray">—</span>'}</td>
          <td style="display:flex;gap:4px;">
            <button class="btn warn sm" onclick="openEditModal(${it.id})">✎</button>
            <button class="btn danger sm" onclick="removeItem(${it.id})">✕</button>
          </td>
        </tr>`).join('')}
      </tbody>
      <tfoot><tr>
        <td></td>
        <td colspan="3" style="color:var(--muted);font-size:12px;">${itens.length} item${itens.length>1?'s':''}</td>
        <td style="font-family:var(--mono);font-weight:600;color:var(--accent);">${fmt(total)}</td>
        <td colspan="4"></td>
      </tr></tfoot>
    </table></div>`;

  el.innerHTML = `
    <div class="mobile-cards">${mobileCards}
      <div style="text-align:right;padding:.5rem 0;font-family:var(--mono);font-size:13px;color:var(--accent);">Total: ${fmt(total)}</div>
    </div>
    ${desktopTable}`;
}

function toggleSelectAll(checked) {
  const itens = state.itens.filter(i => i.aba === currentAba);
  itens.forEach(it => {
    if (checked) selectedIds.add(it.id); else selectedIds.delete(it.id);
  });
  updateBulkBar();
  renderItens();
}

function removeItem(id) {
  if (!confirm('Remover este item?')) return;
  state.itens = state.itens.filter(i => i.id !== id);
  save();
}

// ── MODAL EDITAR ───────────────────────────────────────────────────────────
function openEditModal(id) {
  id = parseInt(id);
  editingId = id;
  const it = state.itens.find(i => i.id === id);
  document.getElementById('modal-item-title').textContent = 'Editar: ' + it.nome;
  document.getElementById('edit-nome').value  = it.nome;
  document.getElementById('edit-aba').value   = it.aba;
  document.getElementById('edit-qtd').value   = it.qtd;
  document.getElementById('edit-und').value   = it.und || '';
  document.getElementById('edit-preco').value = it.preco;
  document.getElementById('edit-pagou').value = it.quemPagou || '';
  document.getElementById('modal-item').classList.add('open');
}

function saveEdit() {
  const it = state.itens.find(i => i.id === editingId);
  it.nome      = document.getElementById('edit-nome').value.trim() || it.nome;
  it.aba       = document.getElementById('edit-aba').value;
  it.qtd       = parseFloat(document.getElementById('edit-qtd').value) || 0;
  it.und       = document.getElementById('edit-und').value.trim();
  it.preco     = parseFloat(document.getElementById('edit-preco').value) || 0;
  it.quemPagou = document.getElementById('edit-pagou').value;
  save();
  closeModal('modal-item');
}

// ── MODAL QUEM CONSOME ─────────────────────────────────────────────────────
function openPessoasModal(id) {
  id = parseInt(id);
  modalItemId = id;
  const it = state.itens.find(i => i.id === id);
  document.getElementById('modal-pessoas-title').textContent = 'Quem vai consumir: ' + it.nome;
  document.getElementById('search-pessoas').value = '';
  renderChips(Array.isArray(it.quemConsome) ? it.quemConsome : [], '');
  document.getElementById('modal-pessoas').classList.add('open');
}

function renderChips(checked, filter) {
  const grid = document.getElementById('modal-pessoas-grid');
  const filtered = PESSOAS.filter(p => p.toLowerCase().includes(filter.toLowerCase()));
  grid.innerHTML = filtered.map(p => `
    <label class="pessoa-chip ${checked.includes(p)?'checked':''}" id="chip-${p.replace(/\s/g,'_')}">
      <input type="checkbox" value="${p}" ${checked.includes(p)?'checked':''} onchange="toggleChip(this)">
      <span class="dot"></span>${p}
    </label>`).join('');
  updateCount();
}

function filterPessoas(q) {
  const current = [...document.querySelectorAll('#modal-pessoas-grid input:checked')].map(c => c.value);
  renderChips(current, q);
}

function toggleChip(cb) {
  cb.closest('.pessoa-chip').classList.toggle('checked', cb.checked);
  updateCount();
}

function updateCount() {
  const n = document.querySelectorAll('#modal-pessoas-grid input:checked').length;
  document.getElementById('pessoas-count').textContent = n > 0 ? `${n} selecionada${n>1?'s':''}` : '';
}

function selectAllPessoas(val) {
  document.querySelectorAll('#modal-pessoas-grid input').forEach(cb => {
    cb.checked = val;
    cb.closest('.pessoa-chip').classList.toggle('checked', val);
  });
  updateCount();
}

function _savePessoas() {
  const it = state.itens.find(i => i.id === modalItemId);
  if (!it) return;
  it.quemConsome = [...document.querySelectorAll('#modal-pessoas-grid input:checked')].map(c => c.value);
  save();
  closeModal('modal-pessoas');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

['modal-item','modal-pessoas'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal(id);
  });
});

// ── RENDER COMPRAS ─────────────────────────────────────────────────────────
function renderCompras() { return; }
function _renderComprasUnused() {
  const itens = state.itens.filter(i => i.aba === compraAba);
  const total = itens.reduce((s,i) => s+totalItem(i), 0);
  const comprados = itens.filter(i => i.comprado);
  const totalComp = comprados.reduce((s,i) => s+totalItem(i), 0);
  document.getElementById('stats-compras').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total da lista</div><div class="stat-val accent">${fmt(total)}</div></div>
    <div class="stat-card"><div class="stat-label">Já comprado</div><div class="stat-val green">${fmt(totalComp)}</div></div>
    <div class="stat-card"><div class="stat-label">Falta comprar</div><div class="stat-val blue">${fmt(total-totalComp)}</div></div>
    <div class="stat-card"><div class="stat-label">Itens</div><div class="stat-val">${comprados.length}/${itens.length}</div></div>`;
  const el = document.getElementById('compras-list');
  if (!itens.length) { el.innerHTML='<div class="empty">Nenhum item cadastrado.</div>'; return; }
  el.innerHTML = itens.map(it => `
    <div class="compra-row">
      <input type="checkbox" class="compra-check" ${it.comprado?'checked':''} onchange="toggleComprado(${it.id},this.checked)">
      <div class="compra-info">
        <div class="compra-nome ${it.comprado?'done':''}">${it.nome}</div>
        <div class="compra-meta">${it.qtd}${it.und?' '+it.und:''} · ${it.quemConsome&&it.quemConsome.length?it.quemConsome.length+' pessoas':'todos'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;">
        <span style="font-family:var(--mono);font-size:13px;color:var(--accent2);">${it.preco?fmt(totalItem(it)):'—'}</span>
        <button class="btn warn sm" onclick="openEditModal(${it.id})">✎</button>
      </div>
    </div>`).join('');
}

function toggleComprado(id, val) {
  state.itens.find(i => i.id === id).comprado = val;
  save();
}

// ── RENDER EXTRATO ─────────────────────────────────────────────────────────
function renderExtrato() {
  const extrato = PESSOAS.map(pessoa => {
    const consumos = state.itens.filter(it =>
      it.preco > 0 && (!it.quemConsome || it.quemConsome.length === 0 || it.quemConsome.includes(pessoa))
    ).map(it => ({ id: it.id, aba: it.aba, nome: it.nome, valor: valorPessoa(it), pagarA: it.quemPagou||null }));
    const total = consumos.reduce((s,c) => s+c.valor, 0);
    const pago  = state.pagamentos[pessoa] || {};
    const totalPago = consumos.filter(c => pago[c.id]).reduce((s,c) => s+c.valor, 0);
    return { pessoa, consumos, total, totalPago, falta: total-totalPago };
  });

  const totalGeral     = extrato.reduce((s,e) => s+e.total, 0);
  const totalPagoGeral = extrato.reduce((s,e) => s+e.totalPago, 0);

  document.getElementById('stats-extrato').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total geral</div><div class="stat-val accent">${fmt(totalGeral)}</div></div>
    <div class="stat-card"><div class="stat-label">Já pago</div><div class="stat-val green">${fmt(totalPagoGeral)}</div></div>
    <div class="stat-card"><div class="stat-label">Falta receber</div><div class="stat-val blue">${fmt(totalGeral-totalPagoGeral)}</div></div>
    <div class="stat-card"><div class="stat-label">Pessoas</div><div class="stat-val">${extrato.filter(e=>e.falta>.01).length} devendo</div></div>`;

  const el = document.getElementById('extrato-list');
  if (!state.itens.length) { el.innerHTML='<div class="empty">Cadastre itens para ver o extrato.</div>'; return; }

  // Restaura blocos abertos após re-render
  const restoreOpen = () => {
    openExtratos.forEach(nome => {
      const headers = document.querySelectorAll('.extrato-header');
      headers.forEach(h => {
        if (h.querySelector('.nome') && h.querySelector('.nome').textContent.trim() === nome) {
          h.nextElementSibling.classList.add('open');
          h.querySelector('.chevron').classList.add('open');
        }
      });
    });
  };

  el.innerHTML = extrato.map(e => {
    const pago = state.pagamentos[e.pessoa] || {};
    return `
    <div class="extrato-pessoa">
      <div class="extrato-header" onclick="toggleExtrato(this)">
        <div style="display:flex;align-items:center;gap:.75rem;">
          <div style="width:34px;height:34px;border-radius:50%;background:rgba(200,241,53,.12);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--accent);">
            ${e.pessoa.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
          </div>
          <div>
            <div class="nome">${e.pessoa}</div>
            <div style="font-size:11px;color:var(--muted);">${e.consumos.length} item${e.consumos.length!==1?'s':''}</div>
          </div>
        </div>
        <div class="valores">
          ${e.falta<=.01
            ? '<span class="badge green">✓ quitado</span>'
            : `<span style="font-size:11px;color:var(--muted);">falta</span><span class="total-val">${fmt(e.falta)}</span>`}
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="extrato-body">
        ${e.consumos.length===0
          ? '<div style="padding:1rem 1.25rem;color:var(--muted);font-size:13px;">Nenhum item.</div>'
          : renderGrupos(e.consumos, pago, e.pessoa)}
        <div style="display:flex;justify-content:space-between;align-items:center;padding:.75rem 1.25rem;background:var(--surface2);">
          <span style="font-size:12px;color:var(--muted);">Total</span>
          <span style="font-family:var(--mono);font-weight:600;">${fmt(e.total)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  restoreOpen();
}

function toggleExtrato(header) {
  header.nextElementSibling.classList.toggle('open');
  header.querySelector('.chevron').classList.toggle('open');
}

let openExtratos = [];

function togglePago(pessoa, itemId) {
  if (!state.pagamentos[pessoa]) state.pagamentos[pessoa] = {};
  state.pagamentos[pessoa][itemId] = !state.pagamentos[pessoa][itemId];
  // Guarda quais blocos estão abertos antes de salvar (o Firebase vai re-renderizar)
  openExtratos = [...document.querySelectorAll('.extrato-body.open')]
    .map(el => el.closest('.extrato-pessoa').querySelector('.nome').textContent.trim());
  save();
}

function renderGrupos(consumos, pago, pessoa) {
  const grupos = {};
  consumos.forEach(c => {
    const credor = c.pagarA || '—';
    if (!grupos[credor]) grupos[credor] = { itens: [], total: 0 };
    grupos[credor].itens.push(c);
    grupos[credor].total += c.valor;
  });

  // Usa data attributes em vez de onclick inline para evitar problemas com aspas
  return Object.entries(grupos).map(([credor, g]) => {
    const todosPagos = g.itens.every(c => pago[c.id]);
    const credorLabel = credor !== '—' ? 'Pagar a <strong>' + credor + '</strong>' : 'Sem credor definido';
    const totalColor  = todosPagos ? 'var(--success)' : 'var(--accent)';
    const totalLabel  = (todosPagos ? '✓ ' : '') + fmt(g.total);

    const itensHtml = g.itens.map(c => {
      const cp = pago[c.id] ? 'pago' : '';
      const bt = pago[c.id] ? '✓ pago' : 'marcar pago';
      return '<div class="extrato-item" style="padding-left:2.25rem;">'
        + '<div class="item-info">'
        + '<div class="item-name">' + c.nome + '</div>'
        + '<div class="item-meta">' + c.aba + '</div>'
        + '</div>'
        + '<div style="display:flex;align-items:center;gap:.75rem;">'
        + '<span style="font-family:var(--mono);font-size:13px;">' + fmt(c.valor) + '</span>'
        + '<button class="pago-btn ' + cp + '" data-action="pago-item" data-pessoa="' + pessoa + '" data-id="' + c.id + '">' + bt + '</button>'
        + '</div></div>';
    }).join('');

    const marcarBtn = credor !== '—'
      ? '<button class="pago-btn ' + (todosPagos ? 'pago' : '') + '" data-action="pago-grupo" data-pessoa="' + pessoa + '" data-ids="' + g.itens.map(c=>c.id).join(',') + '" data-todos="' + todosPagos + '">'
        + (todosPagos ? '✓ tudo pago' : 'marcar tudo pago') + '</button>'
      : '';

    return '<div style="border-bottom:1px solid var(--border);">'
      + '<div class="grupo-header" style="display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;background:var(--surface2);cursor:pointer;">'
      + '<div style="display:flex;align-items:center;gap:.5rem;">'
      + '<svg class="g-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted);transition:transform .2s;"><polyline points="9 18 15 12 9 6"/></svg>'
      + '<span style="font-size:13px;font-weight:500;">' + credorLabel + '</span>'
      + '<span style="font-size:11px;color:var(--muted);">' + g.itens.length + ' item' + (g.itens.length > 1 ? 's' : '') + '</span>'
      + '</div>'
      + '<div style="display:flex;align-items:center;gap:.75rem;">'
      + '<span style="font-family:var(--mono);font-size:14px;color:' + totalColor + ';">' + totalLabel + '</span>'
      + marcarBtn
      + '</div></div>'
      + '<div class="grupo-itens" style="display:none;">' + itensHtml + '</div>'
      + '</div>';
  }).join('');
}

function toggleGrupo(header) {
  const body = header.nextElementSibling;
  const chev = header.querySelector('.g-chevron');
  const open = body.style.display === 'none';
  body.style.display = open ? 'block' : 'none';
  chev.style.transform = open ? 'rotate(90deg)' : '';
}

// Event delegation para botões dentro do extrato (evita problemas com aspas no onclick)
document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) {
    // toggle grupo header
    const gh = e.target.closest('.grupo-header');
    if (gh) toggleGrupo(gh);
    return;
  }
  const action = btn.dataset.action;
  if (action === 'pago-item') {
    e.stopPropagation();
    togglePago(btn.dataset.pessoa, parseInt(btn.dataset.id));
  } else if (action === 'pago-grupo') {
    e.stopPropagation();
    const ids = btn.dataset.ids.split(',').map(Number);
    const todos = btn.dataset.todos === 'true';
    togglePagoGrupo(btn.dataset.pessoa, ids, todos);
  }
});

function togglePagoGrupo(pessoa, ids, todosPagos) {
  if (!state.pagamentos[pessoa]) state.pagamentos[pessoa] = {};
  ids.forEach(id => { state.pagamentos[pessoa][id] = !todosPagos; });
  openExtratos = [...document.querySelectorAll('.extrato-body.open')]
    .map(el => el.closest('.extrato-pessoa').querySelector('.nome').textContent.trim());
  save();
}

// ── SELEÇÃO MÚLTIPLA ──────────────────────────────────────────────────────
let selectedIds = new Set();

function toggleSelect(id, checked) {
  id = parseInt(id);
  if (checked) selectedIds.add(id); else selectedIds.delete(id);
  updateBulkBar();
  // atualiza visual da linha/card
  document.querySelectorAll('[data-item-id="' + id + '"]').forEach(el => {
    el.classList.toggle('selected', checked);
  });
}

function updateBulkBar() {
  const bar  = document.getElementById('bulk-bar');
  const info = document.getElementById('bulk-info');
  const n = selectedIds.size;
  bar.classList.toggle('show', n > 0);
  info.textContent = n + ' selecionado' + (n !== 1 ? 's' : '');
}

function clearSelection() {
  selectedIds.clear();
  updateBulkBar();
  renderItens();
}

function bulkDelete() {
  if (!confirm('Excluir ' + selectedIds.size + ' itens?')) return;
  state.itens = state.itens.filter(i => !selectedIds.has(i.id));
  selectedIds.clear();
  save();
}

function openBulkPessoas() {
  modalItemId = '__bulk__';
  const selecionados = state.itens.filter(i => selectedIds.has(i.id));
  // garante que quemConsome é sempre array antes de filtrar
  const inter = selecionados.length
    ? (selecionados[0].quemConsome || []).filter(p =>
        selecionados.every(i => (i.quemConsome || []).includes(p)))
    : [];
  document.getElementById('modal-pessoas-title').textContent = 'Quem consome — ' + selectedIds.size + ' itens';
  document.getElementById('search-pessoas').value = '';
  renderChips(inter, '');
  document.getElementById('modal-pessoas').classList.add('open');
}

function savePessoas() {
  if (modalItemId === '__bulk__') {
    const pessoas = [...document.querySelectorAll('#modal-pessoas-grid input:checked')].map(c => c.value);
    state.itens.filter(i => selectedIds.has(i.id)).forEach(i => { i.quemConsome = pessoas; });
    save();
    closeModal('modal-pessoas');
    return;
  }
  _savePessoas();
}

// Listeners dos selects de bulk
document.addEventListener('change', function(e) {
  if (e.target.id === 'bulk-aba' && e.target.value) {
    state.itens.filter(i => selectedIds.has(i.id)).forEach(i => { i.aba = e.target.value; });
    e.target.value = '';
    save();
  }
  if (e.target.id === 'bulk-pagou' && e.target.value) {
    state.itens.filter(i => selectedIds.has(i.id)).forEach(i => { i.quemPagou = e.target.value; });
    e.target.value = '';
    save();
  }
});

// ── INIT ───────────────────────────────────────────────────────────────────
// Não renderiza aqui — espera o Firebase responder (onValue acima)
// Fallback: se Firebase não responder em 5s, esconde loading e renderiza
setTimeout(() => { hideLoading(); renderCurrentPage(); }, 5000);
</script>
</body>
